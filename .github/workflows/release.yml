name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write

jobs:
    release_cross:
        name: Release ${{ matrix.name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-amd64
                      target: x86_64-unknown-linux-gnu
                      binary: universal-explorer
                    - name: linux-arm64
                      target: aarch64-unknown-linux-gnu
                      binary: universal-explorer
                    - name: windows-amd64
                      target: x86_64-pc-windows-gnu
                      binary: universal-explorer.exe
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Validate tag format
              id: tag_check
              shell: bash
              run: |
                  if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "valid=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "valid=false" >> "$GITHUB_OUTPUT"
                    echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  fi

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2

            - name: Install release tools
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y unzip upx-ucl zip
                  cargo install cross --git https://github.com/cross-rs/cross

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cross build --release --locked --target ${{ matrix.target }}

            - name: Compress binary with UPX
              if: steps.tag_check.outputs.valid == 'true'
              run: upx --best --lzma "target/${{ matrix.target }}/release/${{ matrix.binary }}"

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  mkdir -p dist package
                  cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
                  (cd package && zip -9 "../dist/universal-explorer-${{ github.ref_name }}-${{ matrix.name }}.zip" "${{ matrix.binary }}")

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.zip

    release_macos:
        name: Release ${{ matrix.name }}
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: macos-amd64-intel
                      target: x86_64-apple-darwin
                    - name: macos-arm64-apple-silicon
                      target: aarch64-apple-darwin
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate tag format
              id: tag_check
              shell: bash
              run: |
                  if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "valid=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "valid=false" >> "$GITHUB_OUTPUT"
                    echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  fi

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2

            - name: Install release tools
              if: steps.tag_check.outputs.valid == 'true'
              run: brew install upx

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Compress binary with UPX
              if: steps.tag_check.outputs.valid == 'true'
              continue-on-error: true
              run: upx --best --lzma --force-macos "target/${{ matrix.target }}/release/universal-explorer"

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  mkdir -p dist package
                  cp "target/${{ matrix.target }}/release/universal-explorer" package/universal-explorer
                  (cd package && zip -9 "../dist/universal-explorer-${{ github.ref_name }}-${{ matrix.name }}.zip" universal-explorer)

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.zip
