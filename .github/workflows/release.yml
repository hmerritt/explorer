name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write

jobs:
    release_linux:
        name: Release ${{ matrix.name }}
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-amd64
                      asset_arch: amd64
                      runner: ubuntu-24.04
                      target: x86_64-unknown-linux-gnu
                    - name: linux-arm64
                      asset_arch: arm64
                      runner: ubuntu-24.04-arm
                      target: aarch64-unknown-linux-gnu
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate tag format
              id: tag_check
              shell: bash
              run: |
                  if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "valid=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "valid=false" >> "$GITHUB_OUTPUT"
                    echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  fi

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install release tools
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  sudo apt update
                  sudo apt install -y pkg-config libwayland-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev patchelf tar

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Dump gpui build script output on failure
              if: failure()
              run: |
                  echo "=== gpui build script output ==="
                  find target -path "*/build/gpui-*/output" -exec cat {} \; 2>/dev/null || echo "No output file found"
                  echo "=== gpui build script stderr ==="
                  find target -path "*/build/gpui-*/stderr" -exec cat {} \; 2>/dev/null || echo "No stderr file found"

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  set -eu

                  app_dir="package/explorer.app"
                  binary="$app_dir/bin/explorer.bin"
                  mkdir -p \
                    dist \
                    "$app_dir/bin" \
                    "$app_dir/lib" \
                    "$app_dir/share/applications" \
                    "$app_dir/share/icons/hicolor/512x512/apps"

                  install -m 755 "target/${{ matrix.target }}/release/explorer" "$binary"
                  cp assets/explorer.png "$app_dir/share/icons/hicolor/512x512/apps/explorer.png"

                  cat > "$app_dir/bin/explorer" <<'EOF'
                  #!/usr/bin/env sh
                  set -eu

                  app_dir="$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)"
                  export LD_LIBRARY_PATH="$app_dir/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
                  exec "$app_dir/bin/explorer.bin" "$@"
                  EOF
                  chmod 755 "$app_dir/bin/explorer"

                  cat > "$app_dir/share/applications/com.hmerritt.explorer.desktop" <<'EOF'
                  [Desktop Entry]
                  Type=Application
                  Name=Explorer
                  Comment=File Explorer for Windows, macOS, and Linux, built with GPUI.
                  Exec=explorer %F
                  Icon=explorer
                  Terminal=false
                  Categories=Utility;FileManager;
                  MimeType=inode/directory;
                  StartupNotify=true
                  EOF

                  ldd "$binary" | awk '/=> \// { print $3 }' | sort -u | while read -r lib; do
                    name="$(basename "$lib")"
                    case "$name" in
                      libwayland*.so*|libxkbcommon*.so*|libX11*.so*|libxcb*.so*|libXau*.so*|libXdmcp*.so*)
                        cp -L "$lib" "$app_dir/lib/$name"
                        ;;
                    esac
                  done

                  patchelf --set-rpath '$ORIGIN/../lib' "$binary"

                  test -x "$app_dir/bin/explorer"
                  test -x "$binary"
                  test -f "$app_dir/share/applications/com.hmerritt.explorer.desktop"
                  test -f "$app_dir/share/icons/hicolor/512x512/apps/explorer.png"
                  test "$(find "$app_dir/lib" -type f | wc -l)" -gt 0

                  tar -C package -czf "dist/explorer-${{ github.ref_name }}-${{ matrix.name }}.tar.gz" explorer.app
                  cp "dist/explorer-${{ github.ref_name }}-${{ matrix.name }}.tar.gz"

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.tar.gz

    release_windows:
        name: Release ${{ matrix.name }}
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: windows-amd64
                      target: x86_64-pc-windows-msvc
                      binary: explorer.exe
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate tag format
              id: tag_check
              shell: pwsh
              run: |
                  if ("${{ github.ref_name }}" -match '^[0-9]+\.[0-9]+\.[0-9]+$') {
                    "valid=true" >> $env:GITHUB_OUTPUT
                  } else {
                    "valid=false" >> $env:GITHUB_OUTPUT
                    Write-Host "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  }

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path dist, package | Out-Null
                  Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
                  Compress-Archive -Path "package/${{ matrix.binary }}" -DestinationPath "dist/explorer-${{ github.ref_name }}-${{ matrix.name }}.zip" -Force

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.zip

    release_macos:
        name: Release ${{ matrix.name }}
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: macos-amd64-intel
                      target: x86_64-apple-darwin
                    - name: macos-arm64-apple-silicon
                      target: aarch64-apple-darwin
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate tag format
              id: tag_check
              shell: bash
              run: |
                  if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "valid=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "valid=false" >> "$GITHUB_OUTPUT"
                    echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  fi

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  set -eu

                  app_dir="package/Explorer.app"
                  contents_dir="$app_dir/Contents"
                  macos_dir="$contents_dir/MacOS"
                  resources_dir="$contents_dir/Resources"
                  iconset_dir="package/explorer.iconset"
                  archive="dist/explorer-${{ github.ref_name }}-${{ matrix.name }}.zip"

                  mkdir -p dist "$macos_dir" "$resources_dir" "$iconset_dir"
                  install -m 755 "target/${{ matrix.target }}/release/explorer" "$macos_dir/explorer"

                  sips -z 16 16 assets/explorer.png --out "$iconset_dir/icon_16x16.png"
                  sips -z 32 32 assets/explorer.png --out "$iconset_dir/icon_16x16@2x.png"
                  sips -z 32 32 assets/explorer.png --out "$iconset_dir/icon_32x32.png"
                  sips -z 64 64 assets/explorer.png --out "$iconset_dir/icon_32x32@2x.png"
                  sips -z 128 128 assets/explorer.png --out "$iconset_dir/icon_128x128.png"
                  sips -z 256 256 assets/explorer.png --out "$iconset_dir/icon_128x128@2x.png"
                  sips -z 256 256 assets/explorer.png --out "$iconset_dir/icon_256x256.png"
                  sips -z 512 512 assets/explorer.png --out "$iconset_dir/icon_256x256@2x.png"
                  sips -z 512 512 assets/explorer.png --out "$iconset_dir/icon_512x512.png"
                  sips -z 1024 1024 assets/explorer.png --out "$iconset_dir/icon_512x512@2x.png"
                  iconutil -c icns "$iconset_dir" -o "$resources_dir/explorer.icns"

                  cat > "$contents_dir/Info.plist" <<'EOF'
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                    <key>CFBundleDevelopmentRegion</key>
                    <string>en</string>
                    <key>CFBundleDisplayName</key>
                    <string>Explorer</string>
                    <key>CFBundleExecutable</key>
                    <string>explorer</string>
                    <key>CFBundleIconFile</key>
                    <string>explorer</string>
                    <key>CFBundleIdentifier</key>
                    <string>com.hmerritt.explorer</string>
                    <key>CFBundleInfoDictionaryVersion</key>
                    <string>6.0</string>
                    <key>CFBundleName</key>
                    <string>Explorer</string>
                    <key>CFBundlePackageType</key>
                    <string>APPL</string>
                    <key>CFBundleShortVersionString</key>
                    <string>${{ github.ref_name }}</string>
                    <key>CFBundleVersion</key>
                    <string>${{ github.ref_name }}</string>
                    <key>LSApplicationCategoryType</key>
                    <string>public.app-category.utilities</string>
                    <key>NSHighResolutionCapable</key>
                    <true/>
                  </dict>
                  </plist>
                  EOF

                  plutil -lint "$contents_dir/Info.plist"
                  test -x "$macos_dir/explorer"
                  test -f "$resources_dir/explorer.icns"
                  codesign --force --deep --sign - "$app_dir"
                  codesign --verify --deep --strict --verbose=2 "$app_dir"

                  (cd package && ditto -c -k --keepParent Explorer.app "../$archive")
                  zipinfo -1 "$archive" | grep -q '^Explorer.app/Contents/Info.plist$'
                  zipinfo -1 "$archive" | grep -q '^Explorer.app/Contents/MacOS/explorer$'
                  zipinfo -1 "$archive" | grep -q '^Explorer.app/Contents/Resources/explorer.icns$'
                  if zipinfo -1 "$archive" | grep -q '^explorer$'; then
                    echo "macOS archive must not contain a top-level raw explorer executable"
                    exit 1
                  fi

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.zip
