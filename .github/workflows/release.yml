name: Release

on:
    push:
        tags:
            - "*"

permissions:
    contents: write

jobs:
    release_linux:
        name: Release ${{ matrix.name }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: linux-amd64
                      target: x86_64-unknown-linux-gnu
                      binary: explorer
                    - name: linux-arm64
                      target: aarch64-unknown-linux-gnu
                      binary: explorer
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate tag format
              id: tag_check
              shell: bash
              run: |
                  if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "valid=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "valid=false" >> "$GITHUB_OUTPUT"
                    echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  fi

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Install release tools
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  sudo apt update
                  sudo apt install -y unzip zip

            - name: Install cross (Linux targets)
              if: steps.tag_check.outputs.valid == 'true'
              run: cargo install cross --git https://github.com/cross-rs/cross

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cross build --release --locked --target ${{ matrix.target }}

            - name: Dump gpui build script output on failure
              if: failure()
              run: |
                  echo "=== gpui build script output ==="
                  find target -path "*/build/gpui-*/output" -exec cat {} \; 2>/dev/null || echo "No output file found"
                  echo "=== gpui build script stderr ==="
                  find target -path "*/build/gpui-*/stderr" -exec cat {} \; 2>/dev/null || echo "No stderr file found"

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  mkdir -p dist package
                  cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
                  (cd package && zip -9 "../dist/explorer-${{ github.ref_name }}-${{ matrix.name }}.zip" "${{ matrix.binary }}")

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.zip

    release_windows:
        name: Release ${{ matrix.name }}
        runs-on: windows-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: windows-amd64
                      target: x86_64-pc-windows-msvc
                      binary: explorer.exe
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate tag format
              id: tag_check
              shell: pwsh
              run: |
                  if ("${{ github.ref_name }}" -match '^[0-9]+\.[0-9]+\.[0-9]+$') {
                    "valid=true" >> $env:GITHUB_OUTPUT
                  } else {
                    "valid=false" >> $env:GITHUB_OUTPUT
                    Write-Host "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  }

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2
              with:
                  key: ${{ matrix.target }}

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force -Path dist, package | Out-Null
                  Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "package/${{ matrix.binary }}"
                  Compress-Archive -Path "package/${{ matrix.binary }}" -DestinationPath "dist/explorer-${{ github.ref_name }}-${{ matrix.name }}.zip" -Force

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.zip

    release_macos:
        name: Release ${{ matrix.name }}
        runs-on: macos-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: macos-amd64-intel
                      target: x86_64-apple-darwin
                    - name: macos-arm64-apple-silicon
                      target: aarch64-apple-darwin
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Validate tag format
              id: tag_check
              shell: bash
              run: |
                  if [[ "${{ github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "valid=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "valid=false" >> "$GITHUB_OUTPUT"
                    echo "Tag '${{ github.ref_name }}' does not match numeric semver (e.g. 1.2.3). Skipping release."
                  fi

            - name: Install Rust
              if: steps.tag_check.outputs.valid == 'true'
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Cargo
              if: steps.tag_check.outputs.valid == 'true'
              uses: Swatinem/rust-cache@v2

            - name: Build
              if: steps.tag_check.outputs.valid == 'true'
              run: cargo build --release --locked --target ${{ matrix.target }}

            - name: Package artifact
              if: steps.tag_check.outputs.valid == 'true'
              run: |
                  mkdir -p dist package
                  install -m 755 "target/${{ matrix.target }}/release/explorer" package/explorer
                  cat > package/explorer-readme.md <<'EOF'
                  To run the current macOS release artifact:

                  ```sh
                  unzip explorer-*-macos-*.zip
                  chmod +x explorer
                  xattr -d com.apple.quarantine explorer
                  ./explorer
                  ```

                  If macOS still refuses to launch it, these commands can help diagnose whether
                  the issue is quarantine, Gatekeeper, code signing, or the wrong CPU artifact:

                  ```sh
                  xattr -l explorer
                  spctl --assess --type execute -vv ./explorer
                  codesign --verify --verbose ./explorer
                  file ./explorer
                  ```
                  EOF
                  (cd package && zip -9 "../dist/explorer-${{ github.ref_name }}-${{ matrix.name }}.zip" explorer explorer-readme.md)

            - name: Upload release asset
              if: steps.tag_check.outputs.valid == 'true'
              uses: softprops/action-gh-release@v3
              with:
                  draft: true
                  generate_release_notes: true
                  files: dist/*.zip
